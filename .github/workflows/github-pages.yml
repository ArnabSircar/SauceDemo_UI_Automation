name: Deploy Allure Report to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run tests (continue on failure)
        run: npx playwright test || true

      - name: Generate Allure report
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "No test results, creating placeholder"
            mkdir -p allure-report/graph
            mkdir -p allure-report/widgets
          fi

      - name: Create index.html that redirects to graph
        run: |
          cat > allure-report/index.html << 'EOFINDEX'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0;url=graph/">
  <title>Allure Report - Redirecting...</title>
</head>
<body>
  <p>Redirecting to <a href="graph/">Allure Report Dashboard</a>...</p>
  <script>window.location.href = 'graph/';</script>
</body>
</html>
EOFINDEX

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: pages