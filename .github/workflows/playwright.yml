name: Playwright Tests CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Generate Allure HTML Report
        run: npx allure generate allure-results --clean

      - name: Generate PDF Report
        run: node scripts/generateAllurePdf.js

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 7

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-html
          path: allure-report/
          retention-days: 7

      - name: Upload PDF Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-pdf
          path: allure-report.pdf
          retention-days: 7

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Publish Test Results Summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests | 61 |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | 59 |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | 2 |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ~2 min |" >> $GITHUB_STEP_SUMMARY